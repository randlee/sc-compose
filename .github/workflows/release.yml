name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.46.2 or v0.46.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml

jobs:
  gate-and-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize version input
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ github.event.inputs.version }}'
          tag="$raw"
          [[ "$tag" == v* ]] || tag="v${tag}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$raw' (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify requested version matches workspace
        run: |
          python3 scripts/release_artifacts.py verify-version \
            --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
            --workspace-toml Cargo.toml \
            --version '${{ steps.meta.outputs.release_version }}'

      - name: Ensure tag is correct or create it
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune --tags
          tag='${{ steps.meta.outputs.release_tag }}'
          main_sha="$(git rev-parse origin/main)"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}' || true)"
          if [[ -n "$remote_tag_sha" ]]; then
            if [[ "$remote_tag_sha" == "$main_sha" ]]; then
              echo "Tag ${tag} already exists and points to origin/main (${main_sha}), skipping creation"
              exit 0
            fi
            echo "Tag ${tag} exists but points to ${remote_tag_sha}, not origin/main (${main_sha})" >&2
            exit 1
          fi
          git tag "$tag" origin/main
          git push origin "$tag"

  build:
    needs: gate-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          bin_args="$(python3 scripts/release_artifacts.py cargo-build-bin-args --manifest "${RELEASE_ARTIFACT_MANIFEST}")"
          cargo build --release --target ${{ matrix.target }} ${bin_args}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ needs.gate-and-tag.outputs.release_version }}'
          ARCHIVE="sc-compose_${VERSION}_${{ matrix.target }}.tar.gz"
          bins=()
          while IFS= read -r bin; do
            [[ -n "$bin" ]] && bins+=("$bin")
          done < <(python3 scripts/release_artifacts.py cargo-build-bin-args --manifest "${RELEASE_ARTIFACT_MANIFEST}" | sed 's/--bin //g')
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" "${bins[@]}"
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = '${{ needs.gate-and-tag.outputs.release_version }}'
          $ARCHIVE = "sc-compose_${VERSION}_${{ matrix.target }}.zip"
          $binArgs = python3 scripts/release_artifacts.py cargo-build-bin-args --manifest "${env:RELEASE_ARTIFACT_MANIFEST}"
          $bins = @()
          foreach ($item in $binArgs.Split(" ")) {
            if ($item -and $item -ne "--bin") {
              $bins += $item
            }
          }
          $paths = @()
          foreach ($bin in $bins) {
            $paths += "target/${{ matrix.target }}/release/$bin.exe"
          }
          Compress-Archive -Path $paths -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  publish:
    needs: gate-and-tag
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish crates in order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r package wait_secs; do
            cargo publish -p "$package" --locked
            if [[ "$wait_secs" != "0" ]]; then
              sleep "$wait_secs"
            fi
          done < <(python3 scripts/release_artifacts.py list-publish-plan --manifest "${RELEASE_ARTIFACT_MANIFEST}")

  release:
    needs: [gate-and-tag, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate-and-tag.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release/*
