name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml

jobs:
  gate-and-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize version input
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ github.event.inputs.version }}'
          tag="$raw"
          [[ "$tag" == v* ]] || tag="v${tag}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$raw' (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify requested version matches workspace
        run: |
          python3 scripts/release_artifacts.py verify-version \
            --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
            --workspace-toml Cargo.toml \
            --version '${{ steps.meta.outputs.release_version }}'

      - name: Run release gate
        run: scripts/release_gate.sh origin/main origin/develop '${{ steps.meta.outputs.release_version }}' "${RELEASE_ARTIFACT_MANIFEST}"

      - name: Ensure tag is correct or create it
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin --prune --tags
          tag='${{ steps.meta.outputs.release_tag }}'
          main_sha="$(git rev-parse origin/main)"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}' || true)"
          if [[ -n "$remote_tag_sha" ]]; then
            if [[ "$remote_tag_sha" == "$main_sha" ]]; then
              echo "Tag ${tag} already exists and points to origin/main (${main_sha}), skipping creation"
              exit 0
            fi
            echo "Tag ${tag} exists but points to ${remote_tag_sha}, not origin/main (${main_sha})" >&2
            exit 1
          fi
          git tag "$tag" origin/main
          git push origin "$tag"

  build:
    needs: gate-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          bin_args="$(python3 scripts/release_artifacts.py cargo-build-bin-args --manifest "${RELEASE_ARTIFACT_MANIFEST}")"
          cargo build --release --target ${{ matrix.target }} ${bin_args}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ needs.gate-and-tag.outputs.release_version }}'
          ARCHIVE="sc-compose_${VERSION}_${{ matrix.target }}.tar.gz"
          STAGE="sc-compose_${VERSION}_${{ matrix.target }}"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/bin" "$STAGE/share/sc-compose"
          cp "target/${{ matrix.target }}/release/sc-compose" "$STAGE/bin/"
          cp -R examples "$STAGE/share/sc-compose/examples"
          tar czf "$ARCHIVE" "$STAGE"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = '${{ needs.gate-and-tag.outputs.release_version }}'
          $ARCHIVE = "sc-compose_${VERSION}_${{ matrix.target }}.zip"
          $STAGE = "sc-compose_${VERSION}_${{ matrix.target }}"
          if (Test-Path $STAGE) { Remove-Item -Recurse -Force $STAGE }
          New-Item -ItemType Directory -Force -Path "$STAGE/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$STAGE/share/sc-compose" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sc-compose.exe" "$STAGE/bin/sc-compose.exe"
          Copy-Item -Recurse "examples" "$STAGE/share/sc-compose/examples"
          Compress-Archive -Path $STAGE -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  publish:
    needs: gate-and-tag
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish crates in order (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.gate-and-tag.outputs.release_version }}'

          crate_exists() {
            local crate="$1"
            local version="$2"
            cargo search "$crate" --limit 1 | grep -F "${crate} = \"${version}\"" >/dev/null
          }

          publish_if_missing() {
            local crate="$1"
            local wait_seconds="${2:-0}"
            if crate_exists "$crate" "$version"; then
              echo "${crate} ${version} already published; skipping"
              return 0
            fi
            cargo publish -p "$crate" --locked
            if [[ "$wait_seconds" != "0" ]]; then
              sleep "$wait_seconds"
            fi
          }

          while IFS='|' read -r package wait_secs; do
            publish_if_missing "$package" "${wait_secs:-0}"
          done < <(python3 scripts/release_artifacts.py list-publish-plan --manifest "${RELEASE_ARTIFACT_MANIFEST}")

  release:
    needs: [gate-and-tag, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate-and-tag.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release/*

  update-homebrew:
    needs: [gate-and-tag, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: randlee/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute release tarball SHA256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.gate-and-tag.outputs.release_tag }}'
          version='${{ needs.gate-and-tag.outputs.release_version }}'
          tarball_path="${RUNNER_TEMP:?RUNNER_TEMP is required}/release.tar.gz"
          tarball_url="https://github.com/randlee/sc-compose/releases/download/${tag}/sc-compose_${version}_aarch64-apple-darwin.tar.gz"
          echo "tarball_url=${tarball_url}" >> "$GITHUB_OUTPUT"
          curl -fsSL --retry 5 --retry-delay 30 --retry-all-errors -o "${tarball_path}" "${tarball_url}"
          sha256=$(sha256sum "${tarball_path}" | awk '{print $1}')
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Write formula from template
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os

          template = Path("release/homebrew/sc-compose.rb.j2").read_text()
          rendered = (
              template
              .replace("{{ tarball_url }}", os.environ["TARBALL_URL"])
              .replace("{{ sha256 }}", os.environ["SHA256"])
              .replace("{{ version }}", os.environ["VERSION"])
          )
          Path(os.environ["FORMULA"]).write_text(rendered)
          PY
        env:
          FORMULA: homebrew-tap/Formula/sc-compose.rb
          SHA256: ${{ steps.sha.outputs.sha256 }}
          TARBALL_URL: ${{ steps.sha.outputs.tarball_url }}
          VERSION: ${{ needs.gate-and-tag.outputs.release_version }}

      - name: Commit and push to homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.gate-and-tag.outputs.release_version }}'
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sc-compose.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump sc-compose to v${version}"
          git push

  publish-winget:
    needs: [gate-and-tag, release]
    runs-on: ubuntu-latest
    steps:
      - name: Publish to winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: randlee.sc-compose
          installers-regex: 'sc-compose_.*_x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.GITHUB_TOKEN }}
